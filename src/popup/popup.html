<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Augmenter</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>

    <!-- API Key Dialog -->
    <div id="apiKeyDialog" class="api-dialog hidden">
        <div class="api-dialog-sheet">
            <!-- No key: enter key -->
            <div id="apiDialogNoKey" class="api-dialog-body">
                <p class="api-dialog-title">Configure AI Provider</p>
                <div class="api-dialog-field">
                    <label class="api-dialog-label" for="providerSelect">Provider</label>
                    <select id="providerSelect" class="api-dialog-select">
                        <option value="anthropic">Anthropic</option>
                        <option value="openrouter">OpenRouter</option>
                    </select>
                </div>
                <div id="modelField" class="api-dialog-field hidden">
                    <label class="api-dialog-label" for="modelInput">Model</label>
                    <input type="text" id="modelInput" class="api-dialog-input" placeholder="e.g. openai/gpt-4.1" autocomplete="off" spellcheck="false">
                </div>
                <div class="api-dialog-field">
                    <label class="api-dialog-label" for="apiKey">API Key</label>
                    <input type="password" id="apiKey" class="api-dialog-input" placeholder="Paste your Anthropic API key" autocomplete="off" spellcheck="false">
                </div>
                <div class="api-dialog-actions">
                    <button id="apiKeyDialogClose" class="api-dialog-btn cancel">Cancel</button>
                    <button id="apiKeySaveBtn" class="api-dialog-btn confirm">OK</button>
                </div>
            </div>
            <!-- Has key: confirm removal -->
            <div id="apiDialogHasKey" class="api-dialog-body hidden">
                <p class="api-dialog-title">Remove API key?</p>
                <p id="currentProviderInfo" class="api-dialog-subtitle"></p>
                <div class="api-dialog-actions">
                    <button id="apiKeyDialogCancelRemove" class="api-dialog-btn cancel">Cancel</button>
                    <button id="removeApiKeyBtn" class="api-dialog-btn danger">Remove</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scrollable main content -->
    <div class="main-content">
        <div id="modeHint" class="mode-hint hidden"></div>
        <!-- Saved features -->
        <div class="features-section">
            <div class="features-header">
                <h3 class="features-title">Saved Features</h3>
                <button id="apiKeyBtn" class="input-icon-btn" title="API Key">
                    <svg id="apiKeyIconLocked" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" class="hidden">
                        <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                    </svg>
                    <svg id="apiKeyIconUnlocked" width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12.65 10C11.83 7.67 9.61 6 7 6c-3.31 0-6 2.69-6 6s2.69 6 6 6c2.61 0 4.83-1.67 5.65-4H17v4h4v-4h2v-4H12.65zM7 14c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/>
                    </svg>
                </button>
            </div>
            <div id="featuresList" class="features-list">
                <div id="featuresLoading" class="loading">Loading...</div>
                <div id="noFeatures" class="no-items hidden">
                    <span>Type in the prompt below</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Fixed bottom input bar -->
    <div id="inputBar">
        <div id="contextTag" class="context-tag hidden">
            <span id="contextTagText"></span>
            <button id="contextTagClear" class="context-tag-clear">×</button>
        </div>
        <div class="mode-tabs">
            <button class="mode-tab active" id="modePrompt">PROMPT</button>
            <button class="mode-tab" id="modeInspect">INSPECT</button>
            <button class="mode-tab" id="modeDraw">DRAW</button>
        </div>
        <div class="input-row">
            <textarea id="instruction" placeholder="e.g. 'Hide the sidebar', 'Make text larger'" rows="1"></textarea>
            <button id="executeBtn" class="send-btn" title="Send (Ctrl+Enter)">
                <span id="executeText">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 4l-1.41 1.41L17.17 11H4v2h13.17l-6.58 6.59L12 21l9-9z" transform="rotate(-90 12 12)"/>
                    </svg>
                </span>
                <div id="executeSpinner" class="spinner hidden"></div>
            </button>
        </div>
    </div>

    <!-- Loading overlay -->
    <div id="loadingOverlay" class="loading-overlay hidden">
        <div class="loading-overlay-spinner"></div>
        <span class="loading-overlay-label">Generating...</span>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module" src="popup.js"></script>
</body>
</html>
